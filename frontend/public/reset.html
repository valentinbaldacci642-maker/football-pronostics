<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nettoyage — PronosDesFoufous</title>
    <style>
      body { background: #050a12; color: #fff; font-family: system-ui, sans-serif;
        margin: 0; min-height: 100vh; display: flex; align-items: center;
        justify-content: center; flex-direction: column; gap: 16px; padding: 20px; text-align: center; }
      h1 { font-size: 24px; margin: 0; }
      p { color: rgba(255,255,255,0.6); margin: 0; max-width: 380px; line-height: 1.5; }
      .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1);
        border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .ok { color: #22c55e; font-size: 32px; font-weight: bold; margin-right: 8px; }
      a { color: #22c55e; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Nettoyage en cours…</h1>
    <p id="msg">Suppression des caches navigateur et service workers obsolètes. Ne ferme pas cet onglet.</p>
    <script>
      (async function () {
        var spinner = document.getElementById('spinner');
        var title = document.getElementById('title');
        var msg = document.getElementById('msg');
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(function (r) { return r.unregister(); }));
          }
          if ('caches' in window) {
            var keys = await caches.keys();
            await Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }
          try { localStorage.removeItem('pdf-sw-cleanup-v1'); } catch (e) {}
        } catch (e) { /* best effort */ }
        spinner.classList.add('hidden');
        var ok = document.createElement('span');
        ok.className = 'ok';
        ok.textContent = '✓';
        title.textContent = ' Nettoyage terminé';
        title.prepend(ok);
        msg.textContent = '';
        msg.appendChild(document.createTextNode('Redirection vers '));
        var link = document.createElement('a');
        link.href = '/';
        link.textContent = "l'accueil";
        msg.appendChild(link);
        msg.appendChild(document.createTextNode(' dans 2 s…'));
        setTimeout(function () { location.href = '/'; }, 2000);
      })();
    </script>
  </body>
</html>
